services:
  vibe-proving:
    build:
      context: .
      dockerfile: Dockerfile
    image: vibe-proving:latest
    container_name: vibe-proving
    ports:
      - "8080:8080"
    volumes:
      # Host-editable config file
      - ./app/config.toml:/app/config.toml
      # Persistent data directory
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Optional resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional LATRACE memory service
  # latrace:
  #   image: latrace:latest
  #   container_name: latrace
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - LATRACE_TENANT=vibe-proving
  #   restart: unless-stopped

networks:
  default:
    name: vibe-proving-network
