<svg width="1600" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04040

8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10101a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#756346;stop-opacity:0.28" />
      <stop offset="50%" style="stop-color:#9d8865;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#756346;stop-opacity:0.28" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#c5b793;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#04040

8;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="380" fill="url(#bg)"/>
  <ellipse cx="800" cy="190" rx="700" ry="350" fill="url(#glow)"/>

  <!-- Penrose tiling pattern (expanded) -->
  <g opacity="0.11" stroke="url(#gold)" fill="none" stroke-width="0.8">
    <!-- Left cluster -->
    <path d="M 180,120 L 220,175 L 180,230 L 150,175 Z"/>
    <path d="M 220,175 L 260,230 L 220,285 L 180,230 Z"/>
    <path d="M 260,120 L 300,175 L 260,230 L 220,175 Z"/>
    <path d="M 300,175 L 340,230 L 300,285 L 260,230 Z"/>

    <path d="M 350,150 L 375,190 L 350,230 L 325,190 Z"/>
    <path d="M 375,190 L 400,230 L 375,270 L 350,230 Z"/>
    <path d="M 400,130 L 425,170 L 400,210 L 375,170 Z"/>

    <!-- Center geometric forms -->
    <path d="M 500,165 Q 565,115 630,165 Q 695,215 630,265 Q 565,315 500,265 Q 435,215 500,165"/>
    <circle cx="800" cy="190" r="95" stroke-dasharray="3,6"/>
    <circle cx="800" cy="190" r="130" stroke-dasharray="4,8"/>
    <circle cx="800" cy="190" r="165" stroke-dasharray="5,10" opacity="0.65"/>

    <path d="M 970,165 Q 1035,115 1100,165 Q 1165,215 1100,265 Q 1035,315 970,265 Q 905,215 970,165"/>

    <!-- Right cluster (mirror) -->
    <path d="M 1420,120 L 1380,175 L 1420,230 L 1450,175 Z"/>
    <path d="M 1380,175 L 1340,230 L 1380,285 L 1420,230 Z"/>
    <path d="M 1340,120 L 1300,175 L 1340,230 L 1380,175 Z"/>
    <path d="M 1300,175 L 1260,230 L 1300,285 L 1340,230 Z"/>

    <path d="M 1250,150 L 1225,190 L 1250,230 L 1275,190 Z"/>
    <path d="M 1225,190 L 1200,230 L 1225,270 L 1250,230 Z"/>
    <path d="M 1200,130 L 1175,170 L 1200,210 L 1225,170 Z"/>
  </g>

  <!-- Golden spiral traces -->
  <g opacity="0.07" stroke="url(#gold)" fill="none" stroke-width="1.2" filter="url(#blur)">
    <path d="M 140,190 Q 140,145 185,145 Q 230,145 230,190 Q 230,250 185,250 Q 120,250 120,190 Q 120,110 195,110 Q 270,110 270,190 Q 270,280 195,280"/>
    <path d="M 1460,190 Q 1460,145 1415,145 Q 1370,145 1370,190 Q 1370,250 1415,250 Q 1480,250 1480,190 Q 1480,110 1405,110 Q 1330,110 1330,190"/>
  </g>

  <!-- Symmetry lines -->
  <g opacity="0.09" stroke="#9d8865" fill="none" stroke-width="0.6">
    <line x1="450" y1="190" x2="570" y2="190" stroke-dasharray="2,5"/>
    <line x1="1030" y1="190" x2="1150" y2="190" stroke-dasharray="2,5"/>
    <line x1="620" y1="120" x2="980" y2="120" stroke-dasharray="3,7" opacity="0.5"/>
    <line x1="620" y1="260" x2="980" y2="260" stroke-dasharray="3,7" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="800" y="165"
        font-family="'Palatino Linotype', 'Palatino', 'Baskerville', 'Georgia', serif"
        font-size="64"
        font-weight="300"
        fill="#e0e0e4"
        text-anchor="middle"
        letter-spacing="10">
    vibe_proving
  </text>

  <!-- Tagline -->
  <text x="800" y="220"
        font-family="'Palatino Linotype', 'Palatino', 'Baskerville', serif"
        font-size="17"
        font-weight="300"
        fill="#8e8e98"
        text-anchor="middle"
        letter-spacing="14">
    AI  PLATFORM  FOR  STUDENTS  AND  RESEARCHERS
  </text>

  <!-- Subtitle -->
  <text x="800" y="255"
        font-family="'Palatino Linotype', 'Palatino', serif"
        font-size="13"
        font-weight="300"
        fill="#6e6e7a"
        text-anchor="middle"
        letter-spacing="7">
    Learn • Solve • Review • Search
  </text>

  <!-- Bottom accent lines -->
  <g opacity="0.19">
    <line x1="530" y1="305" x2="1070" y2="305" stroke="url(#gold)" stroke-width="0.9"/>
    <line x1="570" y1="314" x2="1030" y2="314" stroke="#8a7963" stroke-width="0.6"/>
  </g>
</svg>
