# =============================================================================
# vibe_proving - 一键启动栈
# 包含：vibe_proving API + LATRACE 记忆服务（Qdrant + Neo4j）
#
# 使用方法：
#   cd app/
#   docker compose up -d
#
# 服务地址：
#   vibe_proving API: http://localhost:8080/docs
#   LATRACE Memory:   http://localhost:8000
#   Qdrant 控制台:    http://localhost:6333
#   Neo4j 可视化:     http://localhost:7474
# =============================================================================

services:
  # ── LATRACE 记忆服务 ────────────────────────────────────────────────────────
  latrace:
    image: ghcr.io/zxxz1000/latrace-memory:latest
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      LLM_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_API_AUTH_ENABLED: "false"
      MEMORY_STARTUP_ENSURE_COLLECTIONS: "true"
      PYTHONUNBUFFERED: "1"
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Qdrant 向量数据库 ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Neo4j 图数据库 ────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── vibe_proving 主服务 ───────────────────────────────────────────────────────
  vibe_proving:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      LATRACE_BASE_URL: http://latrace:8000
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      latrace:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
